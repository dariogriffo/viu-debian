name: Build viu for Debian

on:
  workflow_dispatch:
    inputs:
      VIU_VERSION:
        description: The version of viu to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'

permissions:
  contents: write

jobs:
  build-viu:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout viu-debian
        uses: actions/checkout@v4

      - name: Build viu
        run: ./build.sh ${{ inputs.VIU_VERSION }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: viu_*.deb


  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout viu-debian
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.VIU_VERSION }} ${{ inputs.build_version }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            viu_*.dsc
            viu_*.orig.tar.gz
            viu_*.debian.tar.xz


  release-viu:
    name: (Draft-)Release viu for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-viu
      - build-src
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            viu_*.deb
            viu_*.dsc
            viu_*.orig.tar.gz
            viu_*.debian.tar.xz
          name: ${{ inputs.VIU_VERSION }}+${{ inputs.build_version }}
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
